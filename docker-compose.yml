services:
  cli-proxy-api:
    image: ${CLI_PROXY_IMAGE:-cli-proxy-api-plus:local}
    pull_policy: never
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: cli-proxy-api-plus
    # env_file:
    #   - .env
    environment:
      DEPLOY: ${DEPLOY:-}
      CLI_PROXY_CONFIG_DIR: /CLIProxyAPI/config
      CLI_PROXY_CONFIG_FILE: /CLIProxyAPI/config/config.yaml
      CLI_PROXY_AUTH_DIR: /root/.cli-proxy-api
      CLI_PROXY_LOG_DIR: /CLIProxyAPI/logs
    ports:
      - "8317:8317"
      - "8085:8085"
      - "1455:1455"
      - "54545:54545"
      - "51121:51121"
      - "11451:11451"
    volumes:
      - ${CLI_PROXY_CONFIG_PATH:-./config}:/CLIProxyAPI/config
      - ${CLI_PROXY_AUTH_PATH:-./auths}:/root/.cli-proxy-api
      - ${CLI_PROXY_LOG_PATH:-./logs}:/CLIProxyAPI/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8317/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
