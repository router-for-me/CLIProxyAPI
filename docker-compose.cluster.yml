services:
  cli-proxy-api:
    image: ${CLI_PROXY_IMAGE:-ghcr.io/quqi1599/cliproxyapi:latest}
    pull_policy: always
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        BUILD_DATE: ${BUILD_DATE:-unknown}
        REPOSITORY_URL: ${REPOSITORY_URL:-unknown}
    container_name: cli-proxy-api-cluster
    environment:
      HOME_JWT: ${HOME_JWT:-}
    ports:
      - "8317:8317"
    volumes:
      - ./home:/root/.cli-proxy-api
      - ./logs:/CLIProxyAPI/logs
    command: >
      sh -eu -c '
        if [ -z "$$HOME_JWT" ]; then
          echo "HOME_JWT is required" >&2
          exit 1
        fi

        exec ./CLIProxyAPI -home-jwt "$$HOME_JWT"
      '
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8317/healthz >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    stop_grace_period: 30s
    restart: unless-stopped
