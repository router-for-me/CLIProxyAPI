# 服务器绑定的主机/网卡地址。默认空字符串（""）表示监听所有接口（IPv4 + IPv6）。
# 使用 "127.0.0.1" 或 "localhost" 可仅允许本机访问。
host: ""

# 服务端口
port: 8317

# HTTPS 的 TLS 配置。启用后，服务将使用提供的证书和私钥监听。
tls:
  enable: false
  cert: ""
  key: ""

# 管理 API 配置
remote-management:
  # 是否允许远程（非 localhost）访问管理接口。
  # 为 false 时，仅 localhost 可访问管理端点（仍需提供管理密钥）。
  allow-remote: false

  # 管理密钥。若此处填写明文，启动时会自动哈希化。
  # 所有管理请求（包括 localhost）都需要该密钥。
  # 留空将完全禁用管理 API（所有 /v0/management 路由返回 404）。
  secret-key: ""

  # 为 true 时，禁用内置管理控制面板资源下载与其 HTTP 路由。
  disable-control-panel: false

  # 管理控制面板的 GitHub 仓库地址。支持仓库 URL 或 releases API URL。
  panel-github-repository: "https://github.com/router-for-me/Cli-Proxy-API-Management-Center"

# 认证文件目录（支持用 ~ 表示用户主目录）
auth-dir: "~/.cli-proxy-api"

# 用于鉴权的 API Key 列表
api-keys:
  - "your-api-key-1"
  - "your-api-key-2"
  - "your-api-key-3"

# 启用调试日志
debug: false

# 启用 pprof HTTP 调试服务（host:port）。建议仅绑定 localhost 以保证安全。
pprof:
  enable: false
  addr: "127.0.0.1:8316"

# 为 true 时，关闭高开销 HTTP 中间件功能，以降低高并发下单请求内存占用。
commercial-mode: false

# 为 true 时，将应用日志写入滚动文件而不是 stdout
logging-to-file: false

# logs 目录下日志文件总大小上限（MB）。超过后，最旧日志将
# 被持续删除直到回到上限内。设为 0 可禁用该限制。
logs-max-total-size-mb: 0

# 关闭请求日志时，错误日志文件的最大保留数量。
# 超过后会删除最旧错误日志。默认 10，设为 0 可关闭清理。
error-logs-max-files: 10

# 为 false 时，禁用内存中的用量统计聚合
usage-statistics-enabled: false

# 代理 URL。支持 socks5/http/https 协议。示例:socks5://user:pass@192.168.1.1:1080/
proxy-url: ""

# 为 true 时，未带前缀的模型请求只使用无前缀凭据（prefix 与模型名相同除外）。
force-model-prefix: false

# 为 true 时，将过滤后的上游响应头透传给下游客户端。
# 默认 false（关闭）。
passthrough-headers: false

# 请求失败后的重试次数。当 HTTP 状态码为 403、408、500、502、503、504 时会触发重试。
request-retry: 3

# 单次失败请求最多尝试的不同凭据数量。
# 设为 0 保持旧行为（尝试全部可用凭据）。
max-retry-credentials: 0

# 已冷却凭据在触发重试前允许等待的最长时间（秒）。
max-retry-interval: 30

# 配额超限行为
quota-exceeded:
  switch-project: true # 配额超限时是否自动切换到其他项目
  switch-preview-model: true # 配额超限时是否自动切换到预览模型

# 当多个凭据匹配时的路由选择策略。
routing:
  strategy: "round-robin" # round-robin（默认）或 fill-first

# 为 true 时，为 WebSocket API（/v1/ws）启用鉴权。
ws-auth: false

# 当 > 0 时，非流式响应每 N 秒发送空行，避免连接空闲超时。
nonstream-keepalive-interval: 0

# 流式行为配置（SSE 保活 + 安全的启动阶段重试）。
# streaming:
#   keepalive-seconds: 15   # 默认 0（关闭）；<= 0 表示禁用保活。
#   bootstrap-retries: 1    # 默认 0（关闭）；在发送首字节前可重试次数。

