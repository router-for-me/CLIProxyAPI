# 模型错误自动回退配置
# 当模型请求失败（如 404、429、500）时，按规则自动切换到备用模型 ID 重试
# model-fallback:
#   enabled: false                          # 总开关（默认: false）
#   max-attempts: 3                         # 单次请求最多尝试次数（包含原始模型）
#   trigger-after-retries: 1                # 当前模型先重试 N 次，再切换到回退模型（省略则继承 request-retry）
#   max-total-timeout-ms: -1             # 整条回退链路总超时预算（毫秒，-1 表示禁用总超时）
#   trigger-status-codes:                   # 触发回退的 HTTP 状态码
#     - 404
#     - 408
#     - 429
#     - 500
#     - 502
#     - 503
#     - 504
#   no-fallback-status-codes:               # 永不触发回退的 HTTP 状态码（优先级高于 trigger-status-codes）
#     - 400
#     - 401
#     - 403
#   allow-network-error: true              # 是否允许网络层错误触发回退
#   allow-cross-provider: true             # 是否允许跨提供商回退
#   preserve-requested-model: false         # 是否将响应中的 model 字段改回原始请求模型
#   expose-actual-model-header: true       # 是否添加 X-Actual-Model / X-Requested-Model / X-Model-Fallback-Attempts 响应头（与 passthrough-headers 无关）
#   stream:                                 # 流式请求回退配置
#     enabled: true                         # 是否启用流式回退（默认继承 enabled）
#     prelude-only: true                    # 仅在首字节输出前允许回退
#   rules:                                  # 模型回退规则
