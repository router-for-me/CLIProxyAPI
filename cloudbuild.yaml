# Cloud Build pipeline for CLIProxyAPI -> Artifact Registry (asia-northeast3)
# Triggered manually (gcloud builds submit) or via GitHub trigger.
# TDD gate: go test runs before docker build/push.
steps:
  - name: 'golang:1.26-alpine'
    id: test
    entrypoint: sh
    args:
      - -c
      - |
        set -eux
        apk add --no-cache git build-base
        # Scoped vet+test gate. Two upstream packages (sdk/cliproxy/auth has
        # v6/v7 import mismatch, internal/registry has stale gpt-5.5 catalog
        # expectation) fail today on main; deployment scope excludes them.
        # internal/logging excluded: upstream WriteTo signature mismatch (v7.1.21+)
        TARGETS="./cmd/... ./internal/api/... ./internal/api/handlers/management/... ./internal/api/middleware/... ./internal/cache/... ./internal/config/... ./internal/redisqueue/... ./internal/runtime/... ./internal/store/... ./internal/thinking/... ./internal/translator/... ./internal/watcher/... ./sdk/api/... ./sdk/auth/... ./sdk/cliproxy ./sdk/proxyutil/... ./sdk/translator/... ./test/..."
        go vet $$TARGETS
        go test $$TARGETS

  - name: 'gcr.io/cloud-builders/docker'
    id: build
    entrypoint: sh
    args:
      - -c
      - |
        set -eux
        REV="$${SHORT_SHA:-$$(date -u +%Y%m%d%H%M%S)}"
        COMMIT="$${COMMIT_SHA:-manual}"
        BUILD_DATE="$$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        IMG="asia-northeast3-docker.pkg.dev/$PROJECT_ID/cli-proxy-api/server"
        docker build \
          --build-arg=VERSION="$$REV" \
          --build-arg=COMMIT="$$COMMIT" \
          --build-arg=BUILD_DATE="$$BUILD_DATE" \
          -t "$$IMG:$$REV" \
          -t "$$IMG:latest" \
          .
        docker push --all-tags "$$IMG"

images:
  - 'asia-northeast3-docker.pkg.dev/$PROJECT_ID/cli-proxy-api/server:latest'

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s
