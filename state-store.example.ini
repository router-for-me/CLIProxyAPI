[mongo]
enabled = true
# If the password contains reserved URI characters like / + @ : ?, percent-encode it first.
uri = mongodb://cliproxy_app:<PASSWORD>@127.0.0.1:27017/cliproxy_state?authSource=cliproxy_state
database = cliproxy_state
snapshot_collection = service_state_snapshots
connect_timeout_seconds = 10
operation_timeout_seconds = 5
flush_interval_seconds = 30
