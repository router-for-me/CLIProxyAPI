name: Lint & Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-test:
    name: lint-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      # The previous step was corrupted: a double `@sha@sha` checkout pin mashed
      # onto a `KooshaPari/phenotypeActions/actions/lint-test` reference (a
      # reusable-actions repo that does not exist). Replaced with real inline Go
      # lint+test, matching ci.yml's setup. Trigger left as workflow_dispatch to
      # preserve the existing behavior.
      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.22"

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...
