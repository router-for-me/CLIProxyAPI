name: xai-capacity-validation

on:
  push:
    branches:
      - iodom/fix-xai-stream-capacity-failover

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        run: |
          test -z "$(gofmt -l internal/runtime/executor/xai_executor.go internal/runtime/executor/xai_executor_test.go)"
      - name: Test xAI capacity handling
        run: go test ./internal/runtime/executor -run 'TestXAICapacity|TestXAIExecutorExecuteReturnsCapacity|TestXAIExecutorExecuteStreamEmitsCapacity' -count=1
      - name: Build
        run: go build -o test-output ./cmd/server
