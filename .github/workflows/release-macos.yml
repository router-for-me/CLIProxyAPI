name: release-macos

"on":
  workflow_dispatch:
    inputs:
      tag:
        description: Existing git tag to build and release (example: v1.0.0)
        required: true
        type: string

permissions:
  contents: write

env:
  GO_VERSION: "1.26.4"

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Validate tag exists
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags
          git rev-parse "refs/tags/${TAG}" >/dev/null
      - name: Ensure release exists
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists"
          else
            gh release create "${TAG}" --target "${TAG}" --title "${TAG}" --notes "Automated macOS release build"
          fi

  build-macos:
    name: build ${{ matrix.target }}
    needs: prepare-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-amd64
            runner: macos-15-intel
            goarch: amd64
            asset_arch: amd64
          - target: darwin-arm64
            runner: macos-15
            goarch: arm64
            asset_arch: aarch64
    env:
      TAG: ${{ github.event.inputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag }}
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Refresh models catalog
        shell: bash
        run: bash .github/scripts/refresh-model-catalogs.sh
      - name: Build archive
        shell: bash
        env:
          GOARCH: ${{ matrix.goarch }}
          ASSET_ARCH: ${{ matrix.asset_arch }}
        run: |
          set -euo pipefail
          release_version="${TAG#v}"
          commit="$(git rev-parse --short HEAD)"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          archive_dir="dist/${GOARCH}/archive"
          archive_name="CLIProxyAPI_${release_version}_darwin_${ASSET_ARCH}.tar.gz"

          rm -rf "dist/${GOARCH}"
          mkdir -p "${archive_dir}"

          CGO_ENABLED=1 GOOS=darwin GOARCH="${GOARCH}" go build \
            -ldflags="-s -w -X main.Version=${release_version} -X main.Commit=${commit} -X main.BuildDate=${build_date}" \
            -o "${archive_dir}/cli-proxy-api" ./cmd/server/

          cp LICENSE README.md README_CN.md config.example.yaml "${archive_dir}/"
          tar -C "${archive_dir}" -czf "dist/${archive_name}" cli-proxy-api LICENSE README.md README_CN.md config.example.yaml
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/CLIProxyAPI_*.tar.gz
          if-no-files-found: error
      - name: Upload release asset
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(dist/CLIProxyAPI_*.tar.gz)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No macOS assets found" >&2
            exit 1
          fi
          gh release upload "${TAG}" "${assets[@]}" --clobber
