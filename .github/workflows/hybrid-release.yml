name: Hybrid Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: SemVer tag, for example v7.2.73-hybrid.1
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: hybrid-release
  cancel-in-progress: false

jobs:
  verify:
    name: Validate and test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Validate version and branch
        id: version
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          SELECTED_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ ! "$VERSION" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)-hybrid\.(0|[1-9][0-9]*)$ ]]; then
            echo "version must match vMAJOR.MINOR.PATCH-hybrid.REVISION" >&2
            exit 1
          fi
          if [[ "$SELECTED_BRANCH" != "$DEFAULT_BRANCH" ]]; then
            echo "dispatch releases from the default branch ($DEFAULT_BRANCH), not $SELECTED_BRANCH" >&2
            exit 1
          fi
          if git rev-parse --verify --quiet "refs/tags/$VERSION" >/dev/null; then
            echo "tag already exists: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Download and verify modules
        run: |
          go mod download
          go mod verify
      - name: Check formatting
        shell: bash
        run: |
          files="$(git ls-files -z '*.go' | xargs -0 gofmt -l)"
          if [[ -n "$files" ]]; then
            printf 'Files require gofmt:\n%s\n' "$files"
            exit 1
          fi
      - name: Check vet baseline
        shell: bash
        run: bash .github/scripts/check-vet-baseline.sh
      - name: Test
        run: go test ./...
      - name: Scan for secrets
        shell: bash
        run: |
          set -euo pipefail
          git remote add canonical https://github.com/router-for-me/CLIProxyAPI.git
          git fetch --no-tags canonical main:refs/remotes/canonical/main
          base="$(git merge-base HEAD canonical/main)"
          go run github.com/zricethezav/gitleaks/v8@v8.30.1 git . \
            --log-opts="$base..HEAD" --no-banner --redact --exit-code 1
          go run github.com/zricethezav/gitleaks/v8@v8.30.1 dir . \
            --no-banner --redact --exit-code 1

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            format: tar.gz
          - goos: linux
            goarch: arm64
            format: tar.gz
          - goos: windows
            goarch: amd64
            format: zip
          - goos: windows
            goarch: arm64
            format: zip
          - goos: darwin
            goarch: amd64
            format: tar.gz
          - goos: darwin
            goarch: arm64
            format: tar.gz
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build archive
        shell: bash
        env:
          VERSION: ${{ needs.verify.outputs.version }}
          TARGET_GOOS: ${{ matrix.goos }}
          TARGET_GOARCH: ${{ matrix.goarch }}
          ARCHIVE_FORMAT: ${{ matrix.format }}
        run: |
          set -euo pipefail
          version_without_v="${VERSION#v}"
          package="CLIProxyAPI_${version_without_v}_${TARGET_GOOS}_${TARGET_GOARCH}"
          executable="cli-proxy-api"
          if [[ "$TARGET_GOOS" == "windows" ]]; then executable+=".exe"; fi
          mkdir -p "stage/$package" dist
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          CGO_ENABLED=0 GOOS="$TARGET_GOOS" GOARCH="$TARGET_GOARCH" \
            go build -trimpath \
              -ldflags "-s -w -X main.Version=$VERSION -X main.Commit=$GITHUB_SHA -X main.BuildDate=$build_date" \
              -o "stage/$package/$executable" ./cmd/server
          cp README.md LICENSE config.example.yaml "stage/$package/"
          if [[ "$ARCHIVE_FORMAT" == "zip" ]]; then
            (cd stage && zip -q -r "../dist/$package.zip" "$package")
          else
            tar -C stage -czf "dist/$package.tar.gz" "$package"
          fi
      - name: Upload archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: CLIProxyAPI-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub release
    needs:
      - verify
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Create checksums
        shell: bash
        run: (cd dist && sha256sum CLIProxyAPI_*) > dist/SHA256SUMS
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/*
      - name: Create release and tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          set -euo pipefail
          gh release create "$VERSION" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$VERSION" \
            --generate-notes \
            --prerelease
