name: release-batch

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-batch-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-batch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4with:
          fetch-depth: 0
      - run: git fetch --force --tags
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5with:
          go-version: ">=1.26.0"
          cache: true
      - name: Configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
      - name: Create and publish next batch release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run ./cmd/releasebatch --mode create --target main
