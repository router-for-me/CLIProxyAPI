name: fork-release

# 打 tag 自动发布可部署产物。
#   git tag v7.2.50-fp1 -m "..." && git push origin v7.2.50-fp1
# 触发后:复用仓库根 Dockerfile(CGO_ENABLED=1)构建 Linux **动态链接**二进制 amd64 + arm64,
# 产物与 GHCR 镜像(fork-image.yml)同源、支持插件系统 —— Go 原生 .so 插件必须 CGO+动态链接,
# 纯静态(CGO=0)会静默禁用插件宿主 + 前端插件市场(X-CPA-SUPPORT-PLUGIN:0)。
# 连同 config/systemd/install.sh/DEPLOY.md 打成 tar.gz,发到 GitHub Releases。
# glibc 基线 = debian bookworm(2.36):裸机 systemd 部署需 host glibc≥2.36(debian12+/ubuntu24.04+);
# docker 部署(debian/ubuntu 壳)天然满足,不受影响。只用内置 GITHUB_TOKEN,无需外部 secret。
#
# 注意:必须在 Actions 页禁用上游 `release` 与 `docker-image` —— 上游 release.yaml
# 以 tags:['*'] 吃掉所有 tag 会和本流程争抢同一个 Release;docker-image.yml 缺
# DockerHub secret 会失败。详见 SYNC.md。
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fork-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            asset_arch: amd64
          - platform: linux/arm64
            asset_arch: aarch64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Refresh models catalog (tolerant)
        run: |
          set -uo pipefail
          if git fetch --depth 1 https://github.com/router-for-me/models.git main; then
            git show FETCH_HEAD:models.json > internal/registry/models/models.json
            echo "models.json refreshed"
          else
            echo "models refresh skipped, using bundled models.json"
          fi
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build CGO=1 plugin-capable binary via Dockerfile
        env:
          PLATFORM: ${{ matrix.platform }}
          ASSET_ARCH: ${{ matrix.asset_arch }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="dev-$(git rev-parse --short HEAD)"
          fi
          C="$(git rev-parse --short HEAD)"
          D="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "version=$V commit=$C date=$D arch=$ASSET_ARCH platform=$PLATFORM"

          # 复用官方 Dockerfile(CGO_ENABLED=1)的 builder 阶段构建,产物与 GHCR 镜像同源、支持插件。
          # --target builder 只构建到编译阶段(跳过 runtime apt),二进制落在 /app/CLIProxyAPI。
          docker buildx build --platform "$PLATFORM" --target builder --load \
            --build-arg VERSION="$V" --build-arg COMMIT="$C" --build-arg BUILD_DATE="$D" \
            -t cpa-rel:"$ASSET_ARCH" .

          pkg="CLIProxyAPI_${V}_linux_${ASSET_ARCH}"
          dir="dist/${pkg}"
          mkdir -p "$dir"

          # 从镜像提取二进制(docker cp 是纯文件拷贝、不执行,故跨架构 arm64 也 OK)
          cid="$(docker create --platform "$PLATFORM" cpa-rel:"$ASSET_ARCH")"
          docker cp "$cid:/app/CLIProxyAPI" "$dir/cli-proxy-api"
          docker rm "$cid" >/dev/null

          # 断言:CGO=1 动态链接(插件系统所需);纯静态则插件被禁用 —— 此处必须失败
          if ! readelf -l "$dir/cli-proxy-api" | grep -q 'Requesting program interpreter'; then
            echo "::error::binary is NOT dynamically linked — plugin system would be disabled"
            readelf -l "$dir/cli-proxy-api"; exit 1
          fi
          echo "OK: dynamically linked, plugin-capable"
          file "$dir/cli-proxy-api" || true

          cp config.example.yaml LICENSE README.md README_CN.md "$dir/" 2>/dev/null || true
          cp deploy/cli-proxy-api.service deploy/install.sh deploy/DEPLOY.md "$dir/"
          chmod +x "$dir/install.sh" "$dir/cli-proxy-api"
          tar -C dist -czf "dist/${pkg}.tar.gz" "$pkg"
          ls -la dist/*.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.asset_arch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum CLIProxyAPI_*.tar.gz > checksums.txt
          cat checksums.txt
      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          notes="指纹加固 fork 自动发布。

          - Linux **动态链接**二进制(CGO=1,支持插件系统);amd64 与 arm64(aarch64)。
          - glibc 基线 debian bookworm(2.36):裸机部署需 host glibc≥2.36(debian12+/Ubuntu24.04+);
            docker 部署(debian/ubuntu 壳)天然满足。alpine/musl 不兼容。
          - 解压后见包内 \`DEPLOY.md\`,\`sudo ./install.sh\` 一键装到 systemd。
          - Docker 镜像见 GHCR(fork-image.yml,同为 CGO=1、支持插件)。"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/CLIProxyAPI_*.tar.gz dist/checksums.txt --clobber
          else
            gh release create "$TAG" --title "$TAG" --notes "$notes" \
              dist/CLIProxyAPI_*.tar.gz dist/checksums.txt
          fi
