name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format, vet, and workflows
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Download and verify modules
        run: |
          go mod download
          go mod verify
      - name: Check formatting
        shell: bash
        run: |
          files="$(gofmt -l $(git ls-files '*.go'))"
          if [[ -n "$files" ]]; then
            printf 'Files require gofmt:\n%s\n' "$files"
            exit 1
          fi
      - name: Check vet baseline
        shell: bash
        run: bash .github/scripts/check-vet-baseline.sh
      - name: Validate GitHub Actions
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Test
        run: go test ./...
      - name: Compile server
        run: go build -o test-output ./cmd/server

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out complete history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Scan fork-only history
        shell: bash
        run: |
          set -euo pipefail
          git remote add canonical https://github.com/router-for-me/CLIProxyAPI.git
          git fetch --no-tags canonical main:refs/remotes/canonical/main
          base="$(git merge-base HEAD canonical/main)"
          go run github.com/zricethezav/gitleaks/v8@v8.30.1 git . \
            --log-opts="$base..HEAD" --no-banner --redact --exit-code 1
          go run github.com/zricethezav/gitleaks/v8@v8.30.1 dir . \
            --no-banner --redact --exit-code 1
