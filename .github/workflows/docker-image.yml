name: docker-image

on:
  push:
    tags:
      - fork/v*
  workflow_dispatch:
    inputs:
      tag:
        description: '要构建并发布的 Git tag（例如: fork/v7.10.43）'
        required: true
      publish_latest:
        description: '手动补跑时是否同步刷新 latest 标签'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Prepare
        run: |
          platform=linux/amd64
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
          echo "IMAGE_NAME_LC=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release metadata
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ github.event.inputs.tag }}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$RELEASE_TAG" =~ ^fork/v ]]; then
            echo "expected fork/v* tag, got: $RELEASE_TAG" >&2
            exit 1
          fi

          VERSION="${RELEASE_TAG#fork/}"
          VERSION_SEMVER="${VERSION#v}"
          DOCKER_TAG="${RELEASE_TAG//\//-}"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          REPOSITORY_URL="https://github.com/${{ github.repository }}"

          {
            echo "release_tag=$RELEASE_TAG"
            echo "version=$VERSION"
            echo "version_semver=$VERSION_SEMVER"
            echo "docker_tag=$DOCKER_TAG"
            echo "commit=$COMMIT"
            echo "build_date=$BUILD_DATE"
            echo "repository_url=$REPOSITORY_URL"
          } >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}
          tags: |
            type=raw,value=${{ steps.version.outputs.docker_tag }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version_semver }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version_semver }}
            type=semver,pattern={{major}},value=${{ steps.version.outputs.version_semver }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' || github.event.inputs.publish_latest == 'true' }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,scope=build-${{ env.PLATFORM_PAIR }},mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ steps.version.outputs.commit }}
            BUILD_DATE=${{ steps.version.outputs.build_date }}
            REPOSITORY_URL=${{ steps.version.outputs.repository_url }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Prepare
        run: |
          echo "IMAGE_NAME_LC=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Generate release metadata
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ github.event.inputs.tag }}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$RELEASE_TAG" =~ ^fork/v ]]; then
            echo "expected fork/v* tag, got: $RELEASE_TAG" >&2
            exit 1
          fi

          VERSION="${RELEASE_TAG#fork/}"
          VERSION_SEMVER="${VERSION#v}"
          DOCKER_TAG="${RELEASE_TAG//\//-}"

          {
            echo "release_tag=$RELEASE_TAG"
            echo "version=$VERSION"
            echo "version_semver=$VERSION_SEMVER"
            echo "docker_tag=$DOCKER_TAG"
          } >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}
          tags: |
            type=raw,value=${{ steps.version.outputs.docker_tag }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version_semver }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version_semver }}
            type=semver,pattern={{major}},value=${{ steps.version.outputs.version_semver }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' || github.event.inputs.publish_latest == 'true' }}

      - name: Create manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ steps.version.outputs.docker_tag }}
