# 服务器绑定地址。默认为空("")表示绑定所有接口(IPv4 + IPv6)。
# 使用 "127.0.0.1" 或 "localhost" 仅允许本机访问。
host: ""

# 服务器端口
port: 8317

# TLS/HTTPS 配置。启用后服务器将使用提供的证书和密钥监听。
tls:
  enable: false
  cert: ""
  key: ""

# 管理 API 设置
remote-management:
  # 是否允许远程(非localhost)访问管理端点。
  # 当设为 false 时，仅 localhost 可以访问管理端点(仍需密钥)。
  allow-remote: false

  # 管理密钥。如果在此提供明文值，启动时会进行哈希处理。
  # 所有管理请求(即使来自localhost)都需要此密钥。
  # 留空则完全禁用管理 API(所有 /v0/management 路由返回 404)。
  secret-key: ""

  # 设为 true 时，禁用内置管理控制面板资源下载和 HTTP 路由。
  disable-control-panel: false

  # 禁用自动从 GitHub 定期更新管理面板(默认: false)。
  # 启用后，面板仅在首次访问时如缺失则下载，之后不再自动更新。
  # disable-auto-update-panel: false

  # 管理面板的 GitHub 仓库。支持仓库 URL 或 releases API URL。
  panel-github-repository: "https://github.com/router-for-me/Cli-Proxy-API-Management-Center"

# 认证目录(支持 ~ 表示主目录)
auth-dir: "~/.cli-proxy-api"

# API 密钥列表(用于认证)
api-keys:
  - "your-api-key-1"
  - "your-api-key-2"
  - "your-api-key-3"

# 启用调试日志
debug: false

# 启用 pprof HTTP 调试服务器(host:port)。为安全起见建议绑定 localhost。
pprof:
  enable: false
  addr: "127.0.0.1:8316"

# 为 true 时，禁用高开销的 HTTP 中间件功能，以在高并发下降低每个请求的内存使用。
commercial-mode: false

# 为 true 时，将应用日志写入轮转文件而非 stdout
logging-to-file: false

# 日志目录中日志文件的最大总大小(MB)。超过限制时删除最旧的日志文件直至低于限制。设为 0 禁用。
logs-max-total-size-mb: 0

# 禁用请求日志时保留的最大错误日志文件数量。
# 超过限制时删除最旧的错误日志。默认 10。设为 0 禁用清理。
error-logs-max-files: 10

# 为 false 时，禁用内存使用统计聚合
usage-statistics-enabled: false

# 代理 URL。支持 socks5/http/https 协议。示例: socks5://user:pass@192.168.1.1:1080/
# 每个入口的 proxy-url 也支持 "direct" 或 "none" 以显式跳过全局 proxy-url 和环境代理。
proxy-url: ""

# 为 true 时，无前缀的模型请求仅使用凭据而不添加前缀(除非前缀等于模型名)。
force-model-prefix: false

# 为 true 时，将过滤后的上游响应头转发给下游客户端。
# 默认 false(禁用)。
passthrough-headers: false

# 请求重试次数。当 HTTP 响应码为 403, 408, 500, 502, 503, 504 时触发重试。
request-retry: 3

# 单个失败请求尝试的不同凭据最大数量。
# 设为 0 保持旧行为(尝试所有可用凭据)。
max-retry-credentials: 0

# 冷却凭据触发重试前的最大等待秒数
max-retry-interval: 30

# 单个请求（含重试/冷却等待）的总预算秒数。默认 45，设为 0 禁用预算。
request-budget-seconds: 45

# openai-compatible 同节点短重试次数。
# 仅覆盖“尚未收到 HTTP 响应”的瞬时网络错误，例如 EOF、TLS handshake timeout。
# 该重试先于 request-retry 执行；request-retry 仍负责更外层的 credential/provider 级兜底。
openai-compat-network-retry: 1

# openai-compatible 同节点短重试的基础退避毫秒数。
# 第一次重试等待该时长，后续按 2 倍递增。设为 0 表示不等待直接重试。
openai-compat-network-retry-backoff-ms: 500

# 入口层缺省思考深度策略（仅针对标准入口协议）
# 可通过管理 API 实时更新并写回当前运行配置。
# format/policy/mode/value 取值请以 /v0/management/reasoning-ingress-options 返回为准。
default-reasoning-on-ingress-by-format:
  openai:
    policy: "missing_only" # missing_only | force_override
    mode: "effort"
    value: "xhigh"
  claude:
    policy: "missing_only"
    mode: "adaptive_effort"
    value: "high"
  gemini:
    policy: "missing_only"
    mode: "level"
    value: "medium"

# 配额超出行为
quota-exceeded:
  switch-project: true  # 配额超时时是否自动切换到其他项目
  switch-preview-model: true  # 配额超时时是否自动切换到预览模型

# 有多个匹配凭据时的路由策略
routing:
  strategy: "round-robin"  # round-robin (默认), fill-first

# 为 true 时，启用 WebSocket API (/v1/ws) 的认证
ws-auth: false

# 当 > 0 时，非流式响应每 N 秒发送空行以防止空闲超时。
nonstream-keepalive-interval: 0

# 流式行为 (SSE keep-alive + 安全 bootstrap 重试)。
# streaming:
#   keepalive-seconds: 15   # 默认: 0 (禁用)。<= 0 禁用 keep-alive。
#   bootstrap-retries: 1    # 默认: 0 (禁用)。发送首字节前的重试次数。

